<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — TasteKaAvenger</title>

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --deep-night:#0a0e1a;
  --midnight:#0d1b3e;
  --indigo:#1a237e;
  --cobalt:#1565c0;
  --cerulean:#1e88e5;
  --sky:#42a5f5;
  --pale-blue:#90caf9;
  --gold:#f9a825;
  --amber:#ffb300;
  --cream:#fff8e1;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height:100vh;
  background: var(--deep-night);
  font-family: 'Crimson Pro', serif;
  color: var(--cream);
  overflow-x: hidden;
  cursor: none;
}

/* ─── CURSOR ─── */
.cursor {
  position: fixed;
  width:18px; height:18px;
  border-radius:50%;
  background: radial-gradient(circle, #fff9c4, #ffb300);
  box-shadow: 0 0 12px 4px rgba(255,200,50,0.7);
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  transition: width .2s, height .2s;
}

/* ─── SKY CANVAS ─── */
canvas#sky {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:0; opacity:0.35;
}

.swirl-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:
    radial-gradient(ellipse 120% 60% at 15% 20%, rgba(5,10,30,0.65) 0%, transparent 70%),
    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(8,14,34,0.5) 0%, transparent 80%),
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(5,8,20,0.8) 0%, transparent 60%);
}
.grain {
  position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* ─── NAVBAR ─── */
nav {
  position:sticky; top:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px;
  background:linear-gradient(90deg, rgba(8,12,24,.96), rgba(10,20,50,.88), rgba(8,12,24,.96));
  border-bottom:1px solid rgba(144,202,249,.12);
  backdrop-filter:blur(18px);
}
.nav-brand {
  font-family:'Cinzel Decorative', cursive;
  font-size:1.05rem; color:var(--cream); letter-spacing:.06em;
  text-shadow:0 0 20px rgba(255,200,50,.5), 0 0 40px rgba(66,165,245,.3);
  display:flex; align-items:center; gap:10px; text-decoration:none;
}
.nav-star {
  width:22px; height:22px; flex-shrink:0;
  background:radial-gradient(circle, #fff9c4 20%, #ffb300 60%, transparent 100%);
  border-radius:50%; box-shadow:0 0 12px 5px rgba(255,183,0,.5);
  animation:pulse-star 3s ease-in-out infinite;
}
@keyframes pulse-star {
  0%,100%{ transform:scale(1);   box-shadow:0 0 12px 5px rgba(255,183,0,.5); }
  50%    { transform:scale(1.15); box-shadow:0 0 22px 10px rgba(255,183,0,.8); }
}
.nav-back {
  font-family:'Cinzel Decorative', cursive;
  font-size:.72rem; letter-spacing:.1em; color:var(--pale-blue);
  text-decoration:none; border:1px solid rgba(144,202,249,.3);
  padding:8px 20px; border-radius:50px; backdrop-filter:blur(8px);
  transition:all .3s; cursor:none;
}
.nav-back:hover {
  background:rgba(66,165,245,.12); border-color:rgba(144,202,249,.7);
  color:white; box-shadow:0 0 20px rgba(66,165,245,.3);
}

/* ─── PAGE CONTENT ─── */
.page-wrap {
  position:relative; z-index:5;
  min-height: calc(100vh - 65px);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:40px 20px 80px;
}

/* ─── HERO ─── */
.hero-eyebrow {
  font-style:italic; font-size:.95rem; letter-spacing:.3em;
  color:var(--sky); text-transform:uppercase; text-align:center;
  margin-bottom:8px;
  opacity:0; animation:fadeUp 1s .2s forwards;
}
.hero-title {
  font-family:'Cinzel Decorative', cursive;
  font-size:clamp(1.6rem,4vw,2.8rem); font-weight:700;
  text-align:center;
  background:linear-gradient(135deg,#fff9c4 0%,#ffffff 40%,#90caf9 70%,#42a5f5 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 24px rgba(66,165,245,.4));
  margin-bottom:8px;
  opacity:0; animation:fadeUp 1s .4s forwards;
}
.cosmic-divider {
  display:flex; align-items:center; justify-content:center;
  gap:12px; margin:12px auto 48px; max-width:280px;
  opacity:0; animation:fadeUp 1s .6s forwards;
}
.cosmic-divider::before,.cosmic-divider::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(90deg,transparent,rgba(144,202,249,.5),transparent);
}
.divider-star { color:var(--amber); font-size:1rem; text-shadow:0 0 8px rgba(255,183,0,.8); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─── CARDS GRID ─── */
.cards-grid {
  display:flex; flex-wrap:wrap; gap:28px;
  justify-content:center; max-width:900px; width:100%;
}

.admin-card {
  width:240px; padding:40px 24px 36px;
  background:rgba(8,18,48,0.82);
  backdrop-filter:blur(22px);
  border:1px solid rgba(144,202,249,.2);
  border-radius:22px;
  box-shadow:0 4px 32px rgba(0,0,0,0.5);
  display:flex; flex-direction:column; align-items:center; text-align:center;
  text-decoration:none;
  position:relative; overflow:hidden;
  transition:transform .4s, box-shadow .4s, border-color .4s;
  cursor:none;
  opacity:0;
}
.admin-card:nth-child(1){ animation:fadeUp 1s .7s forwards; }
.admin-card:nth-child(2){ animation:fadeUp 1s .9s forwards; }
.admin-card:nth-child(3){ animation:fadeUp 1s 1.1s forwards; }

.admin-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(144,202,249,.25),transparent);
  pointer-events:none;
}
.admin-card::after {
  content:'';
  position:absolute; top:-40%; left:-40%;
  width:180%; height:180%;
  background:radial-gradient(ellipse at center,rgba(66,165,245,.07) 0%,transparent 65%);
  animation:card-glow 6s ease-in-out infinite;
  pointer-events:none;
}
@keyframes card-glow {
  0%,100%{ transform:translate(0,0) scale(1); }
  50%    { transform:translate(10%,10%) scale(1.1); }
}

.admin-card:hover {
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 12px 50px rgba(66,165,245,.22), 0 0 0 1px rgba(144,202,249,.38);
  border-color:rgba(144,202,249,.42);
}

.card-icon {
  font-size:2.8rem; margin-bottom:18px;
  filter:drop-shadow(0 0 10px rgba(255,183,0,.5));
  transition:transform .3s;
}
.admin-card:hover .card-icon { transform:scale(1.15) rotate(-4deg); }

.card-title {
  font-family:'Cinzel Decorative', cursive;
  font-size:.82rem; letter-spacing:.1em; color:var(--cream);
  margin-bottom:8px;
}
.card-desc {
  font-style:italic; font-size:.88rem;
  color:rgba(144,202,249,.6); line-height:1.5;
}
.card-arrow {
  margin-top:20px; font-size:1.1rem;
  color:rgba(144,202,249,.35);
  transition:color .3s, transform .3s;
}
.admin-card:hover .card-arrow {
  color:rgba(144,202,249,.9); transform:translateX(5px);
}

/* ─── PASSWORD MODAL ─── */
.pw-overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(5,8,20,0.88);
  backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.pw-modal {
  background:rgba(8,18,48,0.96);
  border:1px solid rgba(144,202,249,.25);
  border-radius:24px; padding:40px 36px;
  width:100%; max-width:420px; text-align:center;
  box-shadow:0 12px 60px rgba(0,0,0,.7);
  position:relative;
  animation:fadeUp .5s forwards;
}
.pw-modal::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(144,202,249,.3),transparent);
}
.pw-icon { font-size:2.5rem; margin-bottom:16px; filter:drop-shadow(0 0 10px rgba(255,183,0,.5)); }
.pw-title {
  font-family:'Cinzel Decorative', cursive;
  font-size:1rem; letter-spacing:.12em; color:var(--cream);
  margin-bottom:6px;
}
.pw-sub {
  font-style:italic; font-size:.9rem;
  color:rgba(144,202,249,.5); margin-bottom:24px;
}
.pw-input {
  width:100%; padding:12px 18px;
  background:rgba(6,14,38,0.8);
  border:1px solid rgba(144,202,249,.25);
  border-radius:50px; color:var(--cream);
  font-family:'Crimson Pro', serif; font-size:1rem;
  text-align:center; letter-spacing:.15em;
  outline:none; transition:border-color .3s, box-shadow .3s;
  cursor:none;
}
.pw-input:focus {
  border-color:rgba(144,202,249,.6);
  box-shadow:0 0 20px rgba(66,165,245,.2);
}
.pw-input::placeholder { color:rgba(144,202,249,.3); letter-spacing:.05em; }
.pw-error {
  font-style:italic; font-size:.85rem;
  color:#ef9a9a; margin-top:10px; min-height:20px;
}
.pw-btn {
  margin-top:20px; width:100%;
  font-family:'Cinzel Decorative', cursive;
  font-size:.75rem; letter-spacing:.12em;
  padding:13px;
  background:linear-gradient(135deg,#fff9c4,#ffb300,#f57f17);
  color:#1a0a00; border:none; border-radius:50px; cursor:none;
  box-shadow:0 0 20px rgba(255,183,0,.4);
  transition:transform .3s, box-shadow .3s;
}
.pw-btn:hover {
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 0 40px rgba(255,183,0,.7);
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="grain"></div>
<canvas id="sky"></canvas>
<div class="swirl-overlay"></div>

<!-- PASSWORD MODAL -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-modal">
    <div class="pw-icon">🔐</div>
    <div class="pw-title">Admin Access</div>
    <p class="pw-sub">Enter your password to continue</p>
    <input type="password" class="pw-input" id="pwInput" placeholder="••••••••" />
    <div class="pw-error" id="pwError"></div>
    <button class="pw-btn" onclick="checkPassword()">Enter ✦</button>
  </div>
</div>

<!-- NAVBAR -->
<nav>
  <a href="/" class="nav-brand">
    <span class="nav-star"></span>
    TasteKaAvenger
  </a>
  <a href="/" class="nav-back">← Home</a>
</nav>

<!-- PAGE -->
<div class="page-wrap">
  <p class="hero-eyebrow">✦ Restricted Access ✦</p>
  <h1 class="hero-title">Admin Dashboard</h1>
  <div class="cosmic-divider">
    <span class="divider-star">✦</span>
    <span class="divider-star" style="font-size:.7rem">✦</span>
    <span class="divider-star">✦</span>
  </div>

  <div class="cards-grid">

    <a href="/view_orders" class="admin-card">
      <span class="card-icon">📦</span>
      <div class="card-title">Orders</div>
      <div class="card-desc">View & manage all incoming orders.</div>
      <div class="card-arrow">→</div>
    </a>

    <a href="/employee" class="admin-card">
      <span class="card-icon">👨‍🍳</span>
      <div class="card-title">Employees</div>
      <div class="card-desc">Add, update & remove staff members.</div>
      <div class="card-arrow">→</div>
    </a>

    <a href="/analytics" class="admin-card">
      <span class="card-icon">📈</span>
      <div class="card-title">Analytics</div>
      <div class="card-desc">Track performance & insights.</div>
      <div class="card-arrow">→</div>
    </a>

  </div>
</div>

<!-- SCRIPTS -->
<script>
/* Cursor */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a, button, .admin-card').forEach(el => {
  el.addEventListener('mouseenter', () => { cursor.style.width='28px'; cursor.style.height='28px'; });
  el.addEventListener('mouseleave', () => { cursor.style.width='18px'; cursor.style.height='18px'; });
});

/* Password */
const adminPassword = "admin123";

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === adminPassword) {
    document.getElementById('pwOverlay').style.display = 'none';
  } else {
    document.getElementById('pwError').textContent = 'Incorrect password. Try again.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

/* Van Gogh Sky */
const skyCanvas = document.getElementById('sky');
const skyCtx = skyCanvas.getContext('2d');
function resize(){ skyCanvas.width=window.innerWidth; skyCanvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function drawSky(){
  const w=skyCanvas.width,h=skyCanvas.height;
  const g=skyCtx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#02040d'); g.addColorStop(.18,'#050c22');
  g.addColorStop(.45,'#0a1a4a'); g.addColorStop(.75,'#0d2060');
  g.addColorStop(1,'#030b1e');
  skyCtx.fillStyle=g; skyCtx.fillRect(0,0,w,h);
}
const swirls=[];
(function(){
  const w=skyCanvas.width,h=skyCanvas.height;
  for(let i=0;i<22;i++) swirls.push({
    x:Math.random()*w, y:Math.random()*h*.7,
    radius:40+Math.random()*120,
    angleOffset:Math.random()*Math.PI*2,
    speed:.003+Math.random()*.006,
    alpha:.04+Math.random()*.08,
    colorIdx:Math.floor(Math.random()*3),
  });
})();
const sc=['rgba(30,136,229,','rgba(21,101,192,','rgba(66,165,245,'];
function drawSwirl(s,t){
  skyCtx.save(); skyCtx.translate(s.x,s.y);
  skyCtx.globalAlpha=s.alpha*(0.7+0.3*Math.sin(t*s.speed*3));
  const g=skyCtx.createRadialGradient(0,0,0,0,0,s.radius);
  g.addColorStop(0,sc[s.colorIdx]+'0.35)');
  g.addColorStop(.4,sc[s.colorIdx]+'0.12)');
  g.addColorStop(1,sc[s.colorIdx]+'0)');
  skyCtx.beginPath();
  for(let a=0;a<Math.PI*4;a+=.05){
    const r=(a/(Math.PI*4))*s.radius;
    const da=s.angleOffset+a+Math.sin(t*s.speed+a*.5)*.4;
    a===0?skyCtx.moveTo(Math.cos(da)*r,Math.sin(da)*r*.5):skyCtx.lineTo(Math.cos(da)*r,Math.sin(da)*r*.5);
  }
  skyCtx.strokeStyle=sc[s.colorIdx]+(s.alpha*1.5)+')'; skyCtx.lineWidth=1.5; skyCtx.stroke();
  skyCtx.fillStyle=g; skyCtx.beginPath();
  skyCtx.ellipse(0,0,s.radius,s.radius*.55,s.angleOffset+t*s.speed*.2,0,Math.PI*2);
  skyCtx.fill(); skyCtx.restore();
}
const stars=[];
(function(){
  const w=skyCanvas.width,h=skyCanvas.height;
  const n=Math.floor(w*h/3000);
  for(let i=0;i<n;i++) stars.push({
    x:Math.random()*w, y:Math.random()*h*.78,
    r:.4+Math.random()*1.6,
    phase:Math.random()*Math.PI*2,
    speed:.4+Math.random()*1.2,
    halo:Math.random()>.85,
  });
})();
function drawStar(s,t){
  const tw=.5+.5*Math.sin(t*s.speed+s.phase);
  if(s.halo){
    const g=skyCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*6);
    g.addColorStop(0,`rgba(255,252,220,${.25*tw})`);
    g.addColorStop(.4,`rgba(144,202,249,${.1*tw})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    skyCtx.fillStyle=g; skyCtx.beginPath(); skyCtx.arc(s.x,s.y,s.r*6,0,Math.PI*2); skyCtx.fill();
  }
  skyCtx.beginPath(); skyCtx.arc(s.x,s.y,s.r*(.8+.2*tw),0,Math.PI*2);
  skyCtx.fillStyle=`rgba(255,252,220,${.5+.5*tw})`; skyCtx.fill();
}
function drawMoon(t){
  const w=skyCanvas.width, mx=w*.82, my=90, p=.96+.04*Math.sin(t*.4);
  [80,55,35].forEach((r,i)=>{
    const g=skyCtx.createRadialGradient(mx,my,0,mx,my,r*p);
    g.addColorStop(0,`rgba(255,249,196,${.04-i*.01})`);
    g.addColorStop(.5,`rgba(66,165,245,${.03-i*.005})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    skyCtx.fillStyle=g; skyCtx.beginPath(); skyCtx.arc(mx,my,r*p,0,Math.PI*2); skyCtx.fill();
  });
  const mg=skyCtx.createRadialGradient(mx-5,my-5,2,mx,my,22*p);
  mg.addColorStop(0,'#fffde7'); mg.addColorStop(.6,'#fff9c4'); mg.addColorStop(1,'#ffe082');
  skyCtx.beginPath(); skyCtx.arc(mx,my,22*p,0,Math.PI*2);
  skyCtx.fillStyle=mg; skyCtx.shadowColor='#fff9c4'; skyCtx.shadowBlur=30; skyCtx.fill(); skyCtx.shadowBlur=0;
}
function drawHills(){
  const w=skyCanvas.width,h=skyCanvas.height;
  skyCtx.save();
  const hg=skyCtx.createLinearGradient(0,h*.72,0,h);
  hg.addColorStop(0,'#05091a'); hg.addColorStop(1,'#020408');
  skyCtx.fillStyle=hg; skyCtx.beginPath(); skyCtx.moveTo(0,h);
  [[0,h*.88],[w*.12,h*.78],[w*.25,h*.82],[w*.38,h*.75],[w*.50,h*.80],
   [w*.63,h*.73],[w*.78,h*.79],[w*.88,h*.76],[w,h*.83],[w,h]]
  .forEach(([px,py])=>skyCtx.lineTo(px,py));
  skyCtx.closePath(); skyCtx.fill(); skyCtx.restore();
}
let T=0;
function animateSky(){ T+=.012; drawSky(); swirls.forEach(s=>drawSwirl(s,T)); stars.forEach(s=>drawStar(s,T)); drawMoon(T); drawHills(); requestAnimationFrame(animateSky); }
animateSky();
</script>
</body>
</html>
