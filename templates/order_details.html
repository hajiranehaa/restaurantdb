<!DOCTYPE html>
<html>
<head>
    <title>Order Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-5">

    <h1 class="text-center mb-4">🧾 Order Invoice</h1>

    <div class="card bg-light text-dark p-3 mb-4">
        <h4>Bill No: {{ order.bill_no }}</h4>
        <p>Date: {{ order.order_date }}</p>
        <h5>Total: ₹{{ order.total_amount }}</h5>
    </div>

    <table class="table table-dark table-bordered text-center">
        <thead>
            <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Subtotal</th>
            </tr>
        </thead>

        <tbody>
            {% for i in items %}
            <tr>
                <td>{{ i.item_name }}</td>
                <td>{{ i.quantity }}</td>
                <td>₹{{ i.item_price }}</td>
                <td>₹{{ i.subtotal }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
